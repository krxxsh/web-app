services:
  - type: web
    name: ai-management-system
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-db
          property: connectionString
      - key: FLASK_APP
        value: backend.app
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: TALISMAN_FORCE_HTTPS
        value: "True"
      - key: FRONTEND_URL
        sync: false  # Set in Render dashboard
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false

databases:
  - name: ai-db
    plan: free
