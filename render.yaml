services:
  - type: web
    name: ai-management-system
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-db
          property: connectionString
      - key: FLASK_APP
        value: backend.app
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ai-db
    plan: free
