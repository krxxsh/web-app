{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Join AI Sched</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-white-50 small uppercase">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control-premium w-100" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label text-white-50 small uppercase">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control-premium w-100"
                        placeholder="+1234567890" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">I want to...</label>
                    <select id="role" name="role" class="form-select form-control-premium w-100">
                        <option value="customer">Book Appointments</option>
                        <option value="business_owner">Manage my Business</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>

            <script>
                document.getElementById('registerForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const username = document.getElementById('username').value;
                    const role = document.getElementById('role').value;
                    const phone = document.getElementById('phone').value;

                    // Fallback local DEV authentication if Firebase is inactive
                    if (typeof firebase === 'undefined' || !firebase.apps.length) {
                        try {
                            const response = await fetch('/dev-register', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password, username, role, phone })
                            });

                            if (response.ok) {
                                window.location.href = (role === 'business_owner') ? '/admin/setup_business' : '/';
                            } else {
                                alert("Local Dev Registration Failed");
                            }
                        } catch (err) {
                            alert("Server error");
                        }
                        return;
                    }

                    try {
                        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                        const user = userCredential.user;
                        await user.updateProfile({ displayName: username });

                        const idToken = await user.getIdToken();

                        // Explicit sync for new users to pass role and metadata
                        const response = await fetch('/api/firebase-login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                idToken: idToken,
                                username: username,
                                role: role,
                                phone: phone
                            })
                        });

                        if (response.ok) {
                            window.location.href = (role === 'business_owner') ? '/admin/setup_business' : '/';
                        }
                    } catch (error) {
                        alert("Registration Failed: " + error.message);
                    }
                });
            </script>
            <div class="mt-3 text-center">
                <small class="text-muted">Already have an account? <a
                        href="{{ url_for('auth.login') }}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
