{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Join AI Sched</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-white-50 small uppercase">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control-premium w-100" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label text-white-50 small uppercase">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control-premium w-100"
                        placeholder="+1234567890" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">I want to...</label>
                    <select id="role" name="role" class="form-select form-control-premium w-100">
                        <option value="customer">Book Appointments</option>
                        <option value="business_owner">Manage my Business</option>
                    </select>
                </div>
                <!-- Dynamic Business Name Field -->
                <div id="businessNameContainer" class="mb-3 d-none">
                    <label for="businessName" class="form-label text-white-50 small uppercase">Business Name</label>
                    <input type="text" id="businessName" name="businessName" class="form-control-premium w-100"
                        placeholder="My Awesome Studio">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <small class="text-muted">Already have an account? <a
                        href="{{ url_for('auth.login') }}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    function validateRedirect(url) {
        if (!url) return '/';
        // SECURITY: Only allow relative paths (starting with /) to prevent Open Redirects
        if (url.startsWith('//') || url.match(/^[a-zA-Z0-9+.-]+:\/\//)) {
            console.warn("External redirect blocked:", url);
            return '/';
        }
        return url;
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;
        const role = document.getElementById('role').value;
        const phone = document.getElementById('phone').value;
        const business_name = document.getElementById('businessName')?.value || "";
        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

        // Use Firebase only
        try {
            // 1. Create user in Firebase
            const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // 2. Update Firebase Display Name
            await user.updateProfile({ displayName: username });

            // 3. Sync role and phone metadata with backend
            // Note: firebase_token_required in backend will create the user shell
            const idToken = await user.getIdToken();
            const response = await fetch('/api/user/select-role', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${idToken}`
                },
                body: JSON.stringify({ role, phone, business_name })
            });
            const data = await response.json();

            if (data.success) {
                showToast('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = validateRedirect(data.redirect);
                }, 1000);
            } else {
                showToast(data.message || 'Metadata sync failed', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account';
            }
        } catch (error) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Create Account';
            showToast('Registration failed: ' + error.message, 'error');
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        const roleSelect = document.getElementById('role');
        const bizContainer = document.getElementById('businessNameContainer');
        const bizInput = document.getElementById('businessName');

        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'business_owner') {
                bizContainer.classList.remove('d-none');
                bizInput.setAttribute('required', '');
            } else {
                bizContainer.classList.add('d-none');
                bizInput.removeAttribute('required');
            }
        });
    });
</script>
{% endblock scripts %}
