{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0 border-top border-primary border-4">
            <h3 class="text-center mb-4"><i class="fas fa-user-shield text-primary me-2"></i>Business Portal</h3>
            <p class="text-center text-muted small mb-4">Manage your salon, staff, and appointments.</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Business Email</label>
                    <input type="email" name="email" class="form-control bg-light" placeholder="admin@local.com"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control bg-light" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Sign In to Dashboard</button>
                </div>
            </form>
            <hr>
            <div class="mt-3 text-center">
                <small class="text-muted">Not a business owner? <a href="{{ url_for('auth.login') }}"
                        class="text-decoration-none fw-bold">Customer Login</a></small>
            </div>
            <div class="mt-1 text-center">
                <small class="text-muted">Register a new business? <a href="{{ url_for('auth.register') }}"
                        class="text-decoration-none">Sign up</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
