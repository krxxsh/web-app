{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-5 glass-card border-0 shadow-lg reveal-step">
            <h3 class="text-center mb-4 text-gradient"><i class="fas fa-user-shield me-2"></i>Business Portal</h3>
            <p class="text-center text-muted small mb-4">Manage your salon, staff, and appointments.</p>
            <form id="adminLoginForm">
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Business Email</label>
                    <input type="email" id="email" name="email" class="form-control-premium w-100"
                        placeholder="admin@local.com" required aria-label="Business Email">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" id="password" name="password" class="form-control-premium w-100" required
                        aria-label="Password">
                </div>
                <div class="mb-3 text-end">
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">Forgot password?</a>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn-premium py-3 fw-bold">Sign In to Dashboard</button>
                </div>
            </form>

            <script>
                document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const submitBtn = e.target.querySelector('button[type="submit"]');

                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';

                    try {
                        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                        window.location.href = '/admin/dashboard';
                    } catch (error) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Sign In to Dashboard';
                        showToast("Login Failed: " + error.message, "error");
                    }
                });
            </script>
            <hr>
            <div class="mt-3 text-center">
                <small class="text-muted">Not a business owner? <a href="{{ url_for('auth.login') }}"
                        class="text-decoration-none fw-bold">Customer Login</a></small>
            </div>
            <div class="mt-1 text-center">
                <small class="text-muted">Register a new business? <a href="{{ url_for('auth.register') }}"
                        class="text-decoration-none">Sign up</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
