{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Reset Password</h3>
            <p class="text-muted text-center mb-4">Enter the OTP sent to your email and set a new password.</p>
            <form id="resetPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required readonly>
                </div>
                <div class="mb-3">
                    <label for="otp" class="form-label">OTP</label>
                    <input type="text" id="otp" name="otp" class="form-control" required placeholder="6-digit code">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter new password">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
                </div>
            </form>
            <div id="message" class="mt-3 text-center d-none"></div>
            <div class="mt-3 text-center">
                <small class="text-muted">Remember your password? <a href="{{ url_for('auth.login') }}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    // Get email and oobCode from URL query string (Firebase provides oobCode)
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    const oobCode = urlParams.get('oobCode'); // Firebase reset token

    if (emailParam) {
        document.getElementById('email').value = decodeURIComponent(emailParam);
    }
    
    // Hide OTP field if oobCode is present (Firebase reset doesn't need OTP)
    if (oobCode) {
        const otpDiv = document.getElementById('otp').closest('.mb-3');
        if (otpDiv) otpDiv.style.display = 'none';
        document.getElementById('otp').required = false;
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Resetting...';

        if (window.isFirebaseActive) {
            try {
                if (oobCode) {
                    await firebase.auth().confirmPasswordReset(oobCode, password);
                } else {
                    throw new Error("Invalid or missing reset token. Please request a new link.");
                }

                messageDiv.classList.remove('d-none', 'alert-danger');
                messageDiv.classList.add('alert', 'alert-success');
                messageDiv.innerHTML = 'Password has been reset successfully! Redirecting to login...';
                
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } catch (error) {
                console.error("Firebase Reset Error:", error);
                messageDiv.classList.remove('d-none', 'alert-success');
                messageDiv.classList.add('alert', 'alert-danger');
                messageDiv.innerHTML = 'Error: ' + (error.message || 'Failed to reset password.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        } else {
            messageDiv.classList.remove('d-none');
            messageDiv.classList.add('alert', 'alert-warning');
            messageDiv.innerHTML = 'Authentication service is currently unavailable.';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Reset Password';
        }
    });
</script>
{% endblock scripts %}
