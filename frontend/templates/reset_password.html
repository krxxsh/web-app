{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Reset Password</h3>
            <p class="text-muted text-center mb-4">Enter the OTP sent to your email and your new password.</p>
            <form id="resetPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" value="{{ email }}" required readonly>
                </div>
                <div class="mb-3">
                    <label for="otp" class="form-label">OTP Code</label>
                    <input type="text" id="otp" name="otp" class="form-control" required placeholder="Enter 6-digit OTP">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="At least 8 characters">
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
                </div>
            </form>
            <div id="message" class="mt-3 text-center d-none"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        if (password !== confirm_password) {
            messageDiv.classList.remove('d-none', 'alert-success');
            messageDiv.classList.add('alert', 'alert-danger');
            messageDiv.innerHTML = 'Passwords do not match.';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Resetting...';
        
        try {
            const response = await fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, password })
            });

            const result = await response.json();
            messageDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
            
            if (response.ok) {
                messageDiv.classList.add('alert', 'alert-success');
                messageDiv.innerHTML = result.message + ' Redirecting to login...';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                messageDiv.classList.add('alert', 'alert-danger');
                messageDiv.innerHTML = result.message || 'An error occurred.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        } catch (err) {
            messageDiv.classList.remove('d-none');
            messageDiv.classList.add('alert', 'alert-danger');
            messageDiv.innerHTML = 'Server error. Please try again later.';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Reset Password';
        }
    });
</script>
{% endblock content %}
