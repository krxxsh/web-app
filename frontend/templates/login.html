{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Login to AI Sched</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 text-end">
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">Forgot password?</a>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login with Email</button>
                    <button id="googleAuthBtn" type="button" class="btn btn-google-login">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"
                            class="me-2" alt="Google Logo">
                        Sign in with Google
                    </button>
                </div>
            </form>
            <div class="text-center mt-3 opacity-50">
                <small><i class="fas fa-lock me-1"></i> Secure 256-bit SSL Connection</small>
            </div>
            <div class="mt-3 text-center">
                <small class="text-muted">Don't have an account? <a
                        href="{{ url_for('auth.register') }}">Register</a></small>
            </div>
            <hr>
            <div class="mt-2 text-center bg-light p-2 rounded">
                <small class="text-muted"><i class="fas fa-briefcase me-1"></i> Business Owner? <a
                        href="{{ url_for('auth.admin_login') }}" class="text-decoration-none fw-bold">Admin
                        Portal</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    async function syncSession() {
        try {
            const idToken = await firebase.auth().currentUser.getIdToken();
            const syncResponse = await fetch('/api/auth/sync', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${idToken}`,
                    'Content-Type': 'application/json'
                }
            });
            const syncData = await syncResponse.json();
            return syncData;
        } catch (error) {
            console.error('Session sync error:', error);
            return { success: false, message: error.message };
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

        try {
            await firebase.auth().signInWithEmailAndPassword(email, password);
            
            const syncData = await syncSession();
            if (syncData.success) {
                showToast('Login successful!', 'success');
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get('next') || syncData.redirect || '/';
                    window.location.href = nextUrl;
                }, 1000);
            } else {
                throw new Error(syncData.message || 'Session sync failed');
            }
        } catch (error) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Login with Email';
            showToast('Login failed: ' + error.message, 'error');
        }
    });

    async function signInWithGoogle() {
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
            
            const syncData = await syncSession();
            if (syncData.success) {
                showToast('Google login successful!', 'success');
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get('next') || syncData.redirect || '/';
                    window.location.href = nextUrl;
                }, 1000);
            } else {
                throw new Error(syncData.message || 'Session sync failed');
            }
        } catch (error) {
            if (error.code !== 'auth/popup-closed-by-user') {
                showToast('Google login failed: ' + error.message, 'error');
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('googleAuthBtn')?.addEventListener('click', signInWithGoogle);
    });
</script>
{% endblock scripts %}
