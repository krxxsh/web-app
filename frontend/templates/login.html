{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Login to AI Sched</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login with Email</button>
                    <button type="button" class="btn btn-outline-light" onclick="signInWithGoogle()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"
                            class="me-2" alt="Google Logo">
                        Sign in with Google
                    </button>
                </div>
            </form>
            <div class="text-center mt-3 opacity-50">
                <small><i class="fas fa-lock me-1"></i> Secure 256-bit SSL Connection</small>
            </div>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    // Fallback local DEV authentication if Firebase is inactive
                    if (typeof firebase === 'undefined' || !firebase.apps.length) {
                        try {
                            const response = await fetch('/dev-login', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password })
                            });

                            if (response.ok) {
                                window.location.href = '/';
                            } else {
                                alert("Local Dev Login Failed: Invalid credentials");
                            }
                        } catch (err) {
                            alert("Server error");
                        }
                        return;
                    }

                    try {
                        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                        const idToken = await userCredential.user.getIdToken();

                        // Sync will be handled by the listener in base.html automatically,
                        // but we can speed it up or handle errors here.
                        window.location.href = '/';
                    } catch (error) {
                        alert("Login Failed: " + error.message);
                    }
                });

                async function signInWithGoogle() {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    try {
                        await firebase.auth().signInWithPopup(provider);
                        window.location.href = '/';
                    } catch (error) {
                        alert("Google Sign-in Failed: " + error.message);
                    }
                }
            </script>
            <div class="mt-3 text-center">
                <small class="text-muted">Don't have an account? <a
                        href="{{ url_for('auth.register') }}">Register</a></small>
            </div>
            <hr>
            <div class="mt-2 text-center bg-light p-2 rounded">
                <small class="text-muted"><i class="fas fa-briefcase me-1"></i> Business Owner? <a
                        href="{{ url_for('auth.admin_login') }}" class="text-decoration-none fw-bold">Admin
                        Portal</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
