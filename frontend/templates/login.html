{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Login to AI Sched</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 text-end">
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">Forgot password?</a>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login with Email</button>
                    <button id="googleAuthBtn" type="button" class="btn btn-google-login">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"
                            class="me-2" alt="Google Logo">
                        Sign in with Google
                    </button>
                </div>
            </form>
            <div class="text-center mt-3 opacity-50">
                <small><i class="fas fa-lock me-1"></i> Secure 256-bit SSL Connection</small>
            </div>
            <div class="mt-3 text-center">
                <small class="text-muted">Don't have an account? <a
                        href="{{ url_for('auth.register') }}">Register</a></small>
            </div>
            <hr>
            <div class="mt-2 text-center bg-light p-2 rounded">
                <small class="text-muted"><i class="fas fa-briefcase me-1"></i> Business Owner? <a
                        href="{{ url_for('auth.admin_login') }}" class="text-decoration-none fw-bold">Admin
                        Portal</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');
        
        // Show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

        try {
            const response = await fetch('https://web-app-55z4.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Login with Email';
            
            if (response.ok) {
                showToast('Login successful!', 'success');
                // Store token in localStorage
                localStorage.setItem('token', data.data.token);
                // Redirect after brief delay to show toast
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1500);
            } else {
                showToast(data.message || 'Login failed', 'error');
            }
        } catch (err) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Login with Email';
            showToast('Server error: ' + err.message, 'error');
        }
    });

    async function signInWithGoogle() {
        // Redirect to backend's Google login endpoint
        window.location.href = 'https://web-app-55z4.onrender.com/auth/google/login';
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('googleAuthBtn')?.addEventListener('click', signInWithGoogle);
    });
    
    // Toast utility function
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = \`toast align-items-center text-bg-${type} border-0\`;
        toast.role = 'alert';
        toast.innerHTML = \`
            <div class="d-flex">
                <div class="toast-body">
                    ${message}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        \`;
        container.appendChild(toast);
        const bootstrapToast = new bootstrap.Toast(toast, { delay: 5000 });
        bootstrapToast.show();
        
        // Remove toast from DOM when hidden
        toast.addEventListener('hidden.bs.toast', () => {
            toast.remove();
        });
    }
</script>
{% endblock scripts %}
