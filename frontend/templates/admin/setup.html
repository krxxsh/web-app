{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4">Setup Your Business</h3>
            <p class="text-muted text-center mb-4">Let's get your business profile ready for your clients.</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Business Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Acme Clinics, Blue Salon"
                        required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Complete Setup</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
