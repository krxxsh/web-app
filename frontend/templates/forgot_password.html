{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Forgot Password</h3>
            <p class="text-muted text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgotPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
                </div>
            </form>
            <div id="message" class="mt-3 text-center d-none"></div>
            <div class="mt-3 text-center">
                <small class="text-muted">Remember your password? <a href="{{ url_for('auth.login') }}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';

        if (window.isFirebaseActive) {
            try {
                await firebase.auth().sendPasswordResetEmail(email);
                messageDiv.classList.remove('d-none', 'alert-danger');
                messageDiv.classList.add('alert', 'alert-success');
                messageDiv.innerHTML = 'Password reset email sent! Please check your inbox.';
                submitBtn.innerHTML = 'Email Sent ✅';
            } catch (error) {
                messageDiv.classList.remove('d-none', 'alert-success');
                messageDiv.classList.add('alert', 'alert-danger');
                messageDiv.innerHTML = 'Error: ' + error.message;
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Link';
            }
        } else {
            // Local dev fallback
            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                messageDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (response.ok) {
                    messageDiv.classList.add('alert', 'alert-success');
                    messageDiv.innerHTML = 'OTP sent to your email (Dev Mode). Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/reset-password?email=' + encodeURIComponent(email);
                    }, 2000);
                } else {
                    messageDiv.classList.add('alert', 'alert-danger');
                    messageDiv.innerHTML = result.message || 'An error occurred.';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Send Reset Link';
                }
            } catch (err) {
                messageDiv.classList.remove('d-none');
                messageDiv.classList.add('alert', 'alert-danger');
                messageDiv.innerHTML = 'Server error. Please try again.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Link';
            }
        }
    });
</script>
{% endblock scripts %}
