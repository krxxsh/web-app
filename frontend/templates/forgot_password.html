{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-5">
        <div class="card p-4 glass-card border-0 shadow-lg">
            <h3 class="text-center mb-4">Forgot Password</h3>
            <p class="text-muted text-center mb-4">Enter your email address and we'll send you an OTP to reset your password.</p>
            <form id="forgotPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Send OTP</button>
                </div>
            </form>
            <div id="message" class="mt-3 text-center d-none"></div>
            <div class="mt-3 text-center">
                <small class="text-muted">Remember your password? <a href="{{ url_for('auth.login') }}">Login</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce() }}">
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';

        try {
            const response = await fetch('/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const result = await response.json();
            messageDiv.classList.remove('d-none', 'alert-success', 'alert-danger');

            if (response.ok) {
                messageDiv.classList.add('alert', 'alert-success');
                messageDiv.innerHTML = result.message + ' Redirecting...';
                setTimeout(() => {
                    // Redirect to the reset password page on the same frontend
                    window.location.href = '/reset-password?email=' + encodeURIComponent(email);
                }, 2000);
            } else {
                messageDiv.classList.add('alert', 'alert-danger');
                messageDiv.innerHTML = result.message || 'An error occurred.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send OTP';
            }
        } catch (err) {
            messageDiv.classList.remove('d-none');
            messageDiv.classList.add('alert', 'alert-danger');
            messageDiv.innerHTML = 'Server error. Please try again later.';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Send OTP';
        }
    });
</script>
{% endblock scripts %}
