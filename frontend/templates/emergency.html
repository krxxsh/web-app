{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    .emergency-header {
        background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
        color: white;
        border-radius: 12px;
        padding: 2.5rem;
        margin-bottom: 2rem;
    }

    #emergencyMap {
        height: 400px;
        border-radius: 12px;
        margin-bottom: 2rem;
        display: none;
    }

    .hospital-card {
        border-left: 5px solid #ef4444;
    }

    .pulse {
        animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }

        70% {
            transform: scale(1);
            box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }

        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
    }
</style>

<div class="emergency-header text-center">
    <h1 class="display-4 fw-bold mb-3">Emergency Help 🚨</h1>
    <p class="lead mb-4">Quickly find the nearest hospital, clinic, or ambulance station based on your current location.
    </p>
    <button class="btn btn-light btn-lg px-5 fw-bold text-danger pulse" id="locateBtn" aria-label="Find Nearby Help Now">
        <i class="fas fa-location-arrow me-2"></i> Find Nearby Help Now
    </button>
</div>

<div id="emergencyMap"></div>

<div class="row" id="resultsList">
    <!-- Results will be injected here -->
</div>

<template id="resultTemplate">
    <div class="col-md-6 mb-3">
        <div class="card h-100 hospital-card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="fw-bold name">Hospital Name</h5>
                    <span class="badge bg-danger type">Hospital</span>
                </div>
                <p class="text-muted small address mb-2">Address here</p>
                <div class="d-flex gap-2">
                    <a href="#" class="btn btn-primary btn-sm phone-link"><i class="fas fa-phone me-1"></i> Call</a>
                    <a href="#" class="btn btn-outline-secondary btn-sm map-link" target="_blank"><i
                            class="fas fa-external-link-alt me-1"></i> Directions</a>
                </div>
            </div>
        </div>
    </div>
</template>

<script nonce="{{ csp_nonce() }}" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script nonce="{{ csp_nonce() }}">
    let map = null;
    let markers = [];
    document.getElementById('locateBtn').addEventListener('click', getLocation);

    function getLocation() {
        const btn = document.getElementById('locateBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Locating...';

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    fetchNearbyHelp(lat, lng);
                },
                (err) => {
                    alert("Unable to get location: " + err.message);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-location-arrow me-2"></i> Try Again';
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
            btn.disabled = false;
        }
    }

    async function fetchNearbyHelp(lat, lng) {
        try {
            const response = await fetch('/api/emergency/nearby', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat, lng })
            });
            const data = await response.json();
            displayResults(data, lat, lng);
        } catch (error) {
            console.error("Error fetching emergency data:", error);
            alert("Failed to fetch emergency services. Please try again.");
        } finally {
            const btn = document.getElementById('locateBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-location-arrow me-1"></i> Update Location';
        }
    }

    function displayResults(results, userLat, userLng) {
        document.getElementById('emergencyMap').style.display = 'block';
        if (!map) {
            map = L.map('emergencyMap').setView([userLat, userLng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        } else {
            map.setView([userLat, userLng], 14);
        }

        // Clear markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        // User marker
        L.marker([userLat, userLng], {
            icon: L.divIcon({
                className: 'user-loc-icon',
                html: '<div style="background:#3b82f6; width:1.5rem; height:1.5rem; border:2px solid white; border-radius:50%; box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>'
            })
        }).addTo(map).bindPopup("Your Location");

        const list = document.getElementById('resultsList');
        const template = document.getElementById('resultTemplate');
        list.innerHTML = '';

        if (results.length === 0) {
            list.innerHTML = '<div class="col-12 text-center py-5 text-muted">No emergency services found within 5km of your location.</div>';
            return;
        }

        results.forEach(res => {
            // Add marker
            const m = L.marker([res.lat, res.lng], {
                icon: L.divIcon({
                    className: 'hospital-icon',
                    html: '<div style="background:#ef4444; color:white; width:2.5rem; height:2.5rem; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;"><i class="fas fa-plus"></i></div>'
                })
            }).addTo(map).bindPopup(`<b>${res.name}</b><br>${res.type}`);
            markers.push(m);

            // Add card
            const clone = template.content.cloneNode(true);
            clone.querySelector('.name').innerText = res.name;
            clone.querySelector('.type').innerText = res.type.charAt(0).toUpperCase() + res.type.slice(1);
            clone.querySelector('.address').innerText = res.address;

            const phoneBtn = clone.querySelector('.phone-link');
            if (res.phone && res.phone !== 'N/A') {
                phoneBtn.href = `tel:${res.phone}`;
            } else {
                phoneBtn.classList.add('disabled');
            }

            clone.querySelector('.map-link').href = `https://www.google.com/maps/dir/?api=1&destination=${res.lat},${res.lng}`;

            list.appendChild(clone);
        });

        // Zoom to fit all
        let allPoints = [[userLat, userLng], ...results.map(r => [r.lat, r.lng])];
        map.fitBounds(allPoints);
    }
</script>
{% endblock %}
