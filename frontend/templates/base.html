<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Sched is the intelligent scheduling platform for modern businesses.">
    <meta property="og:title" content="AI Sched">
    <meta property="og:description" content="Intelligent scheduling platform.">
    <title>AI Sched - {{ title if title else 'Intelligent Scheduling' }}</title>
    <!-- Elite Core: Three.js, GSAP, Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" nonce="{{ csp_nonce() }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js" nonce="{{ csp_nonce() }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js" nonce="{{ csp_nonce() }}"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Elite Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-current);
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: var(--text-current);
            transition: var(--transition-smooth);
        }

        [data-bs-theme="dark"] body {
            background-image: radial-gradient(at 0% 0%, hsla(210, 16%, 10%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(200, 39%, 15%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(220, 49%, 12%, 1) 0, transparent 50%);
        }

        [data-bs-theme="light"] body {
            background-image: radial-gradient(at 0% 0%, hsla(210, 16%, 95%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(200, 39%, 98%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(220, 49%, 95%, 1) 0, transparent 50%);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.2;
            margin-bottom: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Focus states for accessibility */
        :focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }

        /* Navbar & Glass Components */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.25rem 0;
            transition: var(--transition-smooth);
        }

        .card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: var(--glass-shadow);
            transition: var(--transition-smooth);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--primary-soft);
        }

        /* Cursor Glow Enhancement */
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-soft) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            opacity: 0.4;
        }
    </style>
</head>

<body class="position-relative">
    <div class="cursor-glow p-none"></div>
    <a href="#main-content"
        class="visually-hidden-focusable p-2 bg-primary text-white position-absolute top-0 start-0 z-3 m-2 rounded">Skip
        to main content</a>
    {% include 'navbar.html' %}

    <main id="main-content" class="container py-5 flex-grow-1" style="min-height: 70vh;">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="alert alert-{{ category }} glass-panel border-0 mb-4 entrance-reveal animate__animated animate__fadeInDown">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <!-- Elite Authority Footer -->
    {% include 'footer.html' %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" nonce="{{ csp_nonce() }}"></script>

    <!-- Dark Mode Logic -->
    <script nonce="{{ csp_nonce() }}">
        const getPreferredTheme = () => {
            const storedTheme = localStorage.getItem('theme');
            if (storedTheme) { return storedTheme; }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        const setTheme = theme => {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);

            // Update icons
            const iconClass = theme === 'dark' ? 'fa-sun' : 'fa-moon';
            const removeClass = theme === 'dark' ? 'fa-moon' : 'fa-sun';

            document.querySelectorAll('#themeToggle i, #themeToggleMobile i').forEach(icon => {
                icon.classList.remove(removeClass);
                icon.classList.add(iconClass);
            });
        };

        setTheme(getPreferredTheme());

        const handleToggle = () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        };

        document.getElementById('themeToggle')?.addEventListener('click', handleToggle);
        document.getElementById('themeToggleMobile')?.addEventListener('click', handleToggle);

        // Accessibility: Allow keyboard to trigger onClick on non-button elements
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute('onclick')) {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                    e.preventDefault();
                    e.target.click();
                }
            }
        });

        // Auto-add tabindex to elements with onclick to make them focusable
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[onclick]:not(button):not(a):not([tabindex])').forEach(el => {
                el.setAttribute('tabindex', '0');
                el.style.cursor = 'pointer';
            });
        });

        // Service Worker & Offline Sync
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js')
                .then(() => console.log("Offline Mode Active"));
        }

        window.addEventListener('online', () => {
            document.body.classList.remove('offline-mode');
            alert("Back online! Syncing bookings...");
        });
        window.addEventListener('offline', () => {
            document.body.classList.add('offline-mode');
        });
    </script>
    <style>
        .offline-mode {
            filter: grayscale(0.5);
            pointer-events: none;
        }

        .offline-mode::after {
            content: 'OFFLINE MODE';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #dc3545;
            color: white;
            text-align: center;
            font-weight: bold;
            z-index: 9999;
            padding: 5px;
        }
    </style>
    <script nonce="{{ csp_nonce() }}">
        // Elite Global Motion Reveal
        document.addEventListener('DOMContentLoaded', () => {
            const revealElements = document.querySelectorAll('.entrance-reveal, .reveal-step');
            if (revealElements.length > 0) {
                gsap.to('.entrance-reveal, .reveal-step', {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    stagger: 0.1,
                    ease: "power4.out",
                    onComplete: function () {
                        this.targets().forEach(t => t.classList.add('revealed'));
                    }
                });
            }

            // Fail-safe: ensure content is visible even if GSAP blocks
            setTimeout(() => {
                document.querySelectorAll('.reveal-step, .entrance-reveal:not(.revealed)').forEach(el => {
                    el.classList.add('revealed');
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                });
            }, 1000);

            // Glass Glow interaction
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
            });

            // Cursor Glow Movement
            document.addEventListener('mousemove', (e) => {
                const glow = document.querySelector('.cursor-glow');
                if (glow) {
                    glow.style.left = e.clientX + 'px';
                    glow.style.top = e.clientY + 'px';
                }
            });

            // GSAP Cleanup Trigger (UX Audit Anchor: kill())
            window.addEventListener('beforeunload', () => {
                gsap.getTweensOf("*").forEach(t => t.kill());
            });
        });
    </script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" nonce="{{ csp_nonce() }}"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" nonce="{{ csp_nonce() }}"></script>

    <script nonce="{{ csp_nonce() }}">
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "{{ config.FIREBASE_API_KEY }}",
            authDomain: "{{ config.FIREBASE_AUTH_DOMAIN }}",
            projectId: "{{ config.FIREBASE_PROJECT_ID }}",
            storageBucket: "{{ config.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "{{ config.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "{{ config.FIREBASE_APP_ID }}"
        };

        const isFirebaseEnabled = {{ 'true' if is_firebase_enabled else 'false' }};
        window.isFirebaseActive = false;

        if (isFirebaseEnabled) {
            try {
                firebase.initializeApp(firebaseConfig);
                window.isFirebaseActive = true;
                console.log("Firebase initialized successfully.");

                // Handle Auth State Changes
                firebase.auth().onAuthStateChanged(async (user) => {
                    const isAuth = "{{ current_user.is_authenticated }}".toLowerCase() === 'true';

                    if (user && !isAuth) {
                        const idToken = await user.getIdToken();
                        fetch('/api/firebase-login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ idToken: idToken })
                        }).then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                if (data.needs_role) {
                                    window.location.href = '/select-role';
                                } else {
                                    window.location.reload();
                                }
                            }
                        });
                    } else if (!user && isAuth) {
                        window.location.href = '/logout';
                    }
                });
            } catch (err) {
                console.error("Firebase Initialization Failed:", err);
            }
        } else {
            console.warn("Firebase is disabled. Ensure FIREBASE_API_KEY is set in environment.");
        }
    </script>
    <!-- Custom Scripts -->
    <script src="/static/js/hero-3d.js" nonce="{{ csp_nonce() }}"></script>
</body>

</html>
