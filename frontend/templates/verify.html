{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 reveal-step">
    <div class="col-md-6">
        <div class="card glass-card p-5 border-0 shadow-lg text-center">
            <h2 class="text-gradient mb-3">Verify Your Account</h2>
            <p class="text-white-50 mb-4">We've sent unique verification codes to both your email and phone number.
                Please enter them below to activate your premium experience.</p>

            <form method="POST">
                <div class="row g-3 mb-4 text-start">
                    <div class="col-12">
                        <label class="form-label text-white-50 small uppercase letter-spacing-1">Email OTP Code</label>
                        <input type="text" name="email_otp" class="form-control-premium w-100 text-center fs-4"
                            maxlength="6" placeholder="000000" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-white-50 small uppercase letter-spacing-1">Phone OTP Code</label>
                        <input type="text" name="phone_otp" class="form-control-premium w-100 text-center fs-4"
                            maxlength="6" placeholder="000000" required>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn-premium py-3">Verify & Access Platform</button>
                    <a href="{{ url_for('verify.resend_otp') }}"
                        class="text-white-50 small text-decoration-none hover-white">Didn't receive codes? Resend
                        OTPs</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
