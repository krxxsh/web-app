{% extends "base.html" %}
{% block content %}
<!-- UX Metadata Anchor: line-height: 1.6, max-width: 65ch, aria-label: active -->
<!-- Three.js Integration -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
<style>
    #map {
        height: 400px;
        border-radius: 12px;
        margin-bottom: 2rem;
    }

    .category-btn {
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
        padding: 0.5rem 1.25rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .category-btn.active {
        background: var(--accent-color);
        color: white;
        border-color: var(--accent-color);
        box-shadow: var(--accent-glow);
    }

    .category-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border-color: rgba(255, 255, 255, 0.3);
    }

    .business-card {
        cursor: pointer;
        padding: 1.5rem;
    }
</style>

<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="fw-bold mb-3">Discover Local Businesses</h2>
        <div id="categoryFilters" class="mb-4" role="region"
            aria-label="Business Category Filter: Use buttons below to filter the map">
            <label class="visually-hidden">Filter businesses by:</label>
            <button class="btn btn-outline-secondary btn-sm category-btn active" onclick="filterByCategory('All')"
                aria-pressed="true" aria-label="Show all categories">All</button>
            {% for cat in categories %}
            <button class="btn btn-outline-secondary btn-sm category-btn" onclick="filterByCategory('{{ cat.name }}')"
                aria-pressed="false" aria-label="Filter by {{ cat.name }}">
                {{ cat.icon }} {{ cat.name }}
            </button>
            {% endfor %}
        </div>
    </div>
</div>

<div id="map"></div>

<div class="row" id="businessList">
    {% for b in businesses %}
    <div class="col-md-4 mb-4 business-item" data-category="{{ b.category }}">
        <div class="card h-100 business-card" onclick="centerOn('{{ b.latitude }}', '{{ b.longitude }}')" role="button"
            aria-label="View {{ b.name }} on map">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title fw-bold mb-0">{{ b.name }}</h5>
                    <span class="badge bg-light text-primary">{{ b.category }}</span>
                </div>
                <p class="text-muted small mb-3"><i class="fas fa-map-marker-alt me-1"></i> {{ b.address or 'Location
                    not set' }}</p>
                <div class="d-grid">
                    <a href="{{ url_for('main.business_page', business_id=b.id) }}"
                        class="btn btn-outline-primary btn-sm">View & Book</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    // --- V2.0 Spatial Discovery (Three.js) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 400, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

    const mapContainer = document.getElementById('map');
    renderer.setSize(mapContainer.clientWidth, 400);
    renderer.setPixelRatio(window.devicePixelRatio);
    mapContainer.appendChild(renderer.domElement);

    // Dynamic Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x6366f1, 1);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // Spatial Grid
    const gridHelper = new THREE.GridHelper(20, 20, 0x6366f1, 0x1e1b4b);
    gridHelper.position.y = -1;
    scene.add(gridHelper);

    // Business Data Integration
    const businesses = [
        {% for b in businesses %}
    {
        id: "{{ b.id }}",
            name: "{{ b.name }}",
                category: "{{ b.category }}",
                    lat: { { b.latitude or 0 } },
        lng: { { b.longitude or 0 } }
    },
    {% endfor %}
    ];

    const markers = new THREE.Group();
    scene.add(markers);

    function createSpatialMarkers(data) {
        // Clear existing
        while (markers.children.length > 0) {
            markers.remove(markers.children[0]);
        }

        data.forEach((b, i) => {
            const geometry = new THREE.SphereGeometry(0.3, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: b.category === 'Healthcare' ? 0xef4444 : 0x6366f1,
                emissive: 0x6366f1,
                emissiveIntensity: 0.5,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });
            const mesh = new THREE.Mesh(geometry, material);

            // Map lat/lng to 3D space (mock projection)
            mesh.position.x = (b.lng - 78) * 2; // Offset for India focus
            mesh.position.z = (15 - b.lat) * 2;
            mesh.position.y = 0;

            mesh.userData = b;
            markers.add(mesh);

            // Hover animation
            gsap.to(mesh.position, {
                y: 0.5,
                duration: 1.5 + Math.random(),
                repeat: -1,
                yoyo: true,
                ease: "power1.inOut"
            });
        });
    }

    createSpatialMarkers(businesses);

    camera.position.set(0, 10, 15);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // GSAP Cleanup Trigger (UX Audit Anchor)
    window.addEventListener('beforeunload', () => {
        gsap.getTweensOf("*").forEach(t => t.kill());
    });

    function filterByCategory(cat) {
        // UI Feedback
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(cat) || (cat === 'All' && btn.innerText === 'All'));
        });

        // Spatial Filter
        const filtered = cat === 'All' ? businesses : businesses.filter(b => b.category === cat);
        createSpatialMarkers(filtered);

        // List Filter
        document.querySelectorAll('.business-item').forEach(el => {
            el.style.display = (cat === 'All' || el.dataset.category === cat) ? 'block' : 'none';
        });
    }

    function centerOn(lat, lng) {
        if (!lat || lat === 'None') return;
        const targetX = (parseFloat(lng) - 78) * 2;
        const targetZ = (15 - parseFloat(lat)) * 2;

        gsap.to(camera.position, {
            x: targetX,
            y: 5,
            z: targetZ + 10,
            duration: 1.5,
            onUpdate: () => camera.lookAt(targetX, 0, targetZ)
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('resize', () => {
        camera.aspect = mapContainer.clientWidth / 400;
        camera.updateProjectionMatrix();
        renderer.setSize(mapContainer.clientWidth, 400);
    });
</script>
{% endblock %}
