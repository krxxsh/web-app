version: '3.8'

services:
  db:
      image: postgres:15
      volumes:
        - postgres_data:/var/lib/postgresql/data
      environment:
        - POSTGRES_USER=${POSTGRES_USER:-admin}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
        - POSTGRES_DB=${POSTGRES_DB:-appointment_db}

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-appointment_db}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db

volumes:
  postgres_data:
