version: '3.8'

services:
  db:
      image: postgres:15
      volumes:
        - postgres_data:/var/lib/postgresql/data
      environment:
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=password
        - POSTGRES_DB=appointment_db

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/appointment_db
      - SECRET_KEY=prod_secret_key_change_me
    depends_on:
      - db

volumes:
  postgres_data:
